<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANT Crypto Monitor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

        :root {
            /* KANT tokens */
            --kant-bg: #0a0a0f;
            --kant-surface: #14141f;
            --kant-surface-raised: #1e1e2e;
            --kant-text: #f0f0f5;
            --kant-text-muted: #a0a0b8;
            --kant-accent: #3b82f6;
            --kant-accent-hover: #60a5fa;
            --kant-accent-subtle: rgba(59,130,246,0.12);
            --kant-accent-border: rgba(59,130,246,0.3);
            --kant-cta: #2563eb;
            --kant-cta-hover: #3b82f6;
            --kant-cta-text: #ffffff;
            --kant-focus: #60a5fa;
            --kant-border: #2a2a3d;
            --kant-error: #ef4444;

            /* App tokens */
            --bg: #060a16;
            --surface: rgba(255,255,255,0.02);
            --border: rgba(255,255,255,0.06);
            --text: #b0bec5;
            --text-dim: #4a5568;
            --text-bright: #e2e8f0;
            --btc: #f7931a; --eth: #627eea; --sol: #00ffa3; --bnb: #f3ba2f;
            --best: #00e676; --better: #ffd740; --good: #42a5f5; --wait: #546e7a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ── SKIP LINK ── */
        .kant-skip-link {
            position: absolute;
            top: -100%;
            left: 16px;
            z-index: 1001;
            padding: 8px 16px;
            background: var(--kant-cta);
            color: var(--kant-cta-text);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            border-radius: 4px;
            text-decoration: none;
            transition: top 100ms ease;
        }
        .kant-skip-link:focus { top: 8px; }

        /* ── KANT STICKY HEADER ── */
        .kant-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--kant-surface);
            border-bottom: 1px solid var(--kant-border);
            padding: 10px 16px;
            backdrop-filter: blur(12px);
            margin-bottom: 0;
            pointer-events: none;
        }
        .kant-header__inner,
        .kant-header__contact {
            pointer-events: auto;
        }
        .kant-header__inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 920px;
            margin: 0 auto;
        }
        .kant-header__name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.1rem);
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--kant-text);
        }
        .kant-header__contact {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.7rem, 2vw, 0.8rem);
            color: var(--kant-accent);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid var(--kant-accent-border);
            border-radius: 9999px;
            transition: all 150ms ease;
        }
        .kant-header__contact:hover {
            background: var(--kant-accent-subtle);
            color: var(--kant-accent-hover);
        }
        .kant-header__contact:focus-visible {
            outline: 3px solid var(--kant-focus);
            outline-offset: 2px;
        }

        /* ── GLOBAL FOCUS ── */
        :focus-visible {
            outline: 3px solid var(--kant-focus);
            outline-offset: 2px;
        }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

        button, a, .scan-btn, .view-btn, .tab, .btn {
            touch-action: manipulation;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            line-height: 1.6;
            -webkit-text-size-adjust: 100%;
        }

        .container { max-width: 920px; margin: 0 auto; padding-top: 8px; }

        /* ── HEADER ── */
        header {
            text-align: center;
            padding: 28px 0 20px;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2em; font-weight: 700;
            color: #fff; letter-spacing: 2px;
        }
        .logo .k { color: var(--btc); }
        .subtitle { font-size: 0.75em; color: var(--text-dim); margin-top: 4px; letter-spacing: 0.5px; }

        /* ── VIEW TOGGLE ── */
        .view-toggle {
            display: flex; gap: 0; margin-bottom: 24px;
            border-radius: 4px; overflow: hidden; border: 1px solid var(--border);
        }
        .view-btn {
            flex: 1; padding: 12px 8px; text-align: center;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8em; font-weight: 600;
            cursor: pointer; background: var(--surface); color: var(--text-dim);
            border: none; border-right: 1px solid var(--border);
            transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .view-btn:last-child { border-right: none; }
        .view-btn:hover { color: var(--text); }
        .view-btn.active { background: rgba(247,147,26,0.1); color: var(--btc); }

        /* ── LANDING PAGE ── */
        #landing, #detail { display: none; }
        #landing.active, #detail.active { display: block; }

        .scan-btn {
            width: 100%; padding: 16px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.9em; font-weight: 600;
            background: rgba(247,147,26,0.08); border: 1px solid rgba(247,147,26,0.25);
            color: var(--btc); border-radius: 4px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1.5px;
            transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .scan-btn:hover { background: rgba(247,147,26,0.14); }
        .scan-btn:active { transform: scale(0.98); }
        .scan-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .loading { display: none; text-align: center; margin: 20px 0; font-size: 0.82em; color: var(--text-dim); }
        .loading.active { display: block; }
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.08); border-top-color: var(--btc);
            border-radius: 50%; animation: spin 0.7s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
            color: var(--kant-error); padding: 12px; border-radius: 4px; margin-top: 16px;
            display: none; font-size: 0.82em; }
        .error.active { display: block; }

        /* ── REDUCED MOTION ── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .spinner { animation: none !important; border-top-color: var(--btc); }
        }

        /* ── RANKING CARDS ── */
        .ranking { margin-top: 24px; }
        .ranking-header {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85em; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 16px; padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .rank-card {
            display: grid;
            grid-template-columns: 36px 1fr;
            gap: 14px;
            padding: 18px 16px;
            margin-bottom: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            align-items: start;
            animation: fadeIn 0.4s ease both;
        }
        .rank-card:nth-child(2) { animation-delay: 0.08s; }
        .rank-card:nth-child(3) { animation-delay: 0.16s; }
        .rank-card:nth-child(4) { animation-delay: 0.24s; }
        .rank-card:nth-child(5) { animation-delay: 0.32s; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rank-num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4em; font-weight: 700; color: var(--text-dim);
            line-height: 1;
        }
        .rank-card:first-child .rank-num { color: var(--best); }

        .rank-body { min-width: 0; }
        .rank-top {
            display: flex; justify-content: space-between; align-items: baseline;
            flex-wrap: wrap; gap: 6px; margin-bottom: 6px;
        }
        .rank-asset {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.05em; font-weight: 700; color: #fff;
        }
        .rank-zone { font-size: 0.78em; font-weight: 600; padding: 2px 8px; border-radius: 3px; }
        .zone-best { background: rgba(0,230,118,0.12); color: var(--best); }
        .zone-better { background: rgba(255,215,64,0.12); color: var(--better); }
        .zone-good { background: rgba(66,165,245,0.12); color: var(--good); }
        .zone-wait { background: rgba(84,110,122,0.12); color: var(--wait); }

        .rank-stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px;
            font-size: 0.78em; color: var(--text-dim); margin: 8px 0;
        }
        .rank-stats .label { color: var(--text-dim); }
        .rank-stats .val { color: var(--text-bright); text-align: right; }

        .rank-reason {
            font-size: 0.75em; color: var(--text-dim);
            margin-top: 6px; padding-top: 6px;
            border-top: 1px solid var(--border);
            line-height: 1.5;
        }

        .summary-footer {
            margin-top: 20px; padding: 14px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 4px; font-size: 0.75em; color: var(--text-dim);
            line-height: 1.7;
        }

        /* ── DETAIL VIEW (TABS + REPORT) ── */
        .tabs {
            display: flex; gap: 0; margin-bottom: 20px;
            border-radius: 4px; overflow: hidden; border: 1px solid var(--border);
        }
        .tab {
            flex: 1; padding: 12px 6px; text-align: center;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8em; font-weight: 600;
            cursor: pointer; background: var(--surface); color: var(--text-dim);
            border: none; border-right: 1px solid var(--border);
            transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .tab:last-child { border-right: none; }
        .tab:hover { color: var(--text); }
        .tab.active { color: #fff; }
        .tab.active[data-asset="BTC"] { background: rgba(247,147,26,0.12); color: var(--btc); }
        .tab.active[data-asset="ETH"] { background: rgba(98,126,234,0.12); color: var(--eth); }
        .tab.active[data-asset="SOL"] { background: rgba(0,255,163,0.12); color: var(--sol); }
        .tab.active[data-asset="BNB"] { background: rgba(243,186,47,0.12); color: var(--bnb); }

        .action-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .btn {
            flex: 1; min-width: 100px; padding: 13px 16px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.85em; font-weight: 600;
            border: 1px solid var(--border); background: var(--surface);
            color: var(--text); cursor: pointer; border-radius: 4px;
            transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover { background: rgba(255,255,255,0.04); }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .report {
            display: none; background: var(--surface); border: 1px solid var(--border);
            border-radius: 6px; padding: 22px; font-size: 0.82em; line-height: 1.85;
            white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word;
        }
        .report.active { display: block; animation: fadeIn 0.4s ease; }

        .info-text { font-size: 0.68em; color: var(--kant-text-muted); margin-top: 20px; line-height: 1.6; }

        /* ── PRINT ── */
        @media print {
            body { background: #fff; color: #111; }
            .kant-header { background: #fff; border-bottom: 1px solid #ccc; }
            .kant-header__name { color: #111; }
            .kant-header__contact { color: #2563eb; border-color: #2563eb; }
        }

        /* ── MOBILE ── */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .logo { font-size: 1.4em; }
            .subtitle { font-size: 0.68em; }
            .scan-btn { padding: 15px; font-size: 0.82em; }
            .rank-card { grid-template-columns: 28px 1fr; gap: 10px; padding: 14px 12px; }
            .rank-num { font-size: 1.1em; }
            .rank-asset { font-size: 0.92em; }
            .rank-stats { grid-template-columns: 1fr 1fr; font-size: 0.72em; gap: 2px 10px; }
            .rank-reason { font-size: 0.7em; }
            .view-btn, .tab { font-size: 0.72em; padding: 10px 4px; }
            .action-row { flex-direction: column; }
            .btn { width: 100%; }
            .report { padding: 12px; font-size: 0.66em; line-height: 1.7; }
            .summary-footer { font-size: 0.68em; }
        }
        @media (min-width: 601px) and (max-width: 768px) {
            .logo { font-size: 1.6em; }
            .report { font-size: 0.75em; }
        }
    </style>
</head>
<body>
<a href="#main-content" class="kant-skip-link">Skip to main content</a>

<header class="kant-header" role="banner">
    <div class="kant-header__inner">
        <span class="kant-header__name">KANT</span>
        <a href="mailto:emmanuelbty@gmail.com" class="kant-header__contact"
           aria-label="Email KANT">emmanuelbty@gmail.com</a>
    </div>
</header>

<main id="main-content">
<div class="container">
    <header role="presentation" aria-hidden="true">
        <div class="logo"><span class="k" aria-hidden="true">K</span><span class="sr-only">KANT </span>ANT</div>
        <p class="subtitle">Crypto Cycle Bottom Monitor</p>
    </header>

    <div class="view-toggle" role="group" aria-label="View selection">
        <button class="view-btn active" onclick="showView('landing')" aria-pressed="true">Overview</button>
        <button class="view-btn" onclick="showView('detail')" aria-pressed="false">Deep Dive</button>
    </div>

    <!-- ═══════════ LANDING PAGE ═══════════ -->
    <div id="landing" class="active" role="region" aria-label="Overview">
        <button class="scan-btn" id="scanBtn" onclick="scanAll()" aria-label="Scan all crypto assets for buy signals">Scan All Assets</button>
        <div class="loading" id="scanLoading" aria-live="polite" aria-atomic="true"><span class="spinner" aria-hidden="true"></span>Scanning BTC, ETH, SOL, BNB...</div>
        <div class="error" id="scanError" role="alert" aria-live="assertive"></div>
        <div class="ranking" id="ranking" aria-live="polite" aria-label="Asset rankings"></div>
    </div>

    <!-- ═══════════ DETAIL VIEW ═══════════ -->
    <div id="detail" role="region" aria-label="Deep Dive">
        <div class="tabs" role="tablist" aria-label="Asset selection">
            <button class="tab active" role="tab" aria-selected="true" data-asset="BTC" onclick="switchTab('BTC')">BTC</button>
            <button class="tab" role="tab" aria-selected="false" data-asset="ETH" onclick="switchTab('ETH')">ETH</button>
            <button class="tab" role="tab" aria-selected="false" data-asset="SOL" onclick="switchTab('SOL')">SOL</button>
            <button class="tab" role="tab" aria-selected="false" data-asset="BNB" onclick="switchTab('BNB')">BNB</button>
        </div>
        <div class="action-row">
            <button class="btn" id="generateBtn" onclick="generateReport()" aria-label="Generate report for selected asset">Generate Report</button>
            <button class="btn" id="copyBtn" onclick="copyReport()" style="display:none;" aria-label="Copy report to clipboard">Copy</button>
            <button class="btn" id="clearBtn" onclick="clearReport()" style="display:none;" aria-label="Clear report">Clear</button>
        </div>
        <div class="loading" id="detailLoading" aria-live="polite" aria-atomic="true"><span class="spinner" aria-hidden="true"></span>Fetching data...</div>
        <div class="error" id="detailError" role="alert" aria-live="assertive"></div>
        <div class="report" id="report" aria-live="polite" aria-label="Asset report" tabindex="-1"></div>
    </div>

    <p class="info-text">
        📊 Live data from Binance &amp; Bybit. Works on any device with internet.<br>
        ⚠️ Directional analysis. Not financial advice. Alts include BTC-correlation lag.
    </p>
</div>
</main>

<script>
// ============================================================
// ASSET CONFIGURATION
// ============================================================

const ASSETS = {
    BTC: {
        name: "Bitcoin", ticker: "BTC", symbol: "BTCUSDT",
        ath: 126000, athDate: "2025-10-06",
        mvrvAtATH: 3.8, mvrvOffset: -0.5,
        typicalDrawdown: 0.60,
        bearDays: 395, btcLagDays: 0,
        priceCeiling: 70000,
        priceBands: { deep: 50000, mid: 55000, fair: 65000 },
    },
    ETH: {
        name: "Ethereum", ticker: "ETH", symbol: "ETHUSDT",
        ath: 4953, athDate: "2025-08-24",
        mvrvAtATH: 3.2, mvrvOffset: -0.3,
        typicalDrawdown: 0.65,
        bearDays: 420, btcLagDays: 21,
        priceCeiling: 2800,
        priceBands: { deep: 1200, mid: 1600, fair: 2200 },
    },
    SOL: {
        name: "Solana", ticker: "SOL", symbol: "SOLUSDT",
        ath: 295, athDate: "2025-01-19",
        mvrvAtATH: 4.5, mvrvOffset: -0.8,
        typicalDrawdown: 0.75,
        bearDays: 450, btcLagDays: 30,
        priceCeiling: 100,
        priceBands: { deep: 35, mid: 50, fair: 75 },
    },
    BNB: {
        name: "BNB", ticker: "BNB", symbol: "BNBUSDT",
        ath: 1370, athDate: "2025-10-13",
        mvrvAtATH: 3.0, mvrvOffset: -0.2,
        typicalDrawdown: 0.55,
        bearDays: 380, btcLagDays: 14,
        priceCeiling: 750,
        priceBands: { deep: 350, mid: 450, fair: 600 },
    }
};

let activeAsset = "BTC";

// ============================================================
// VIEW MANAGEMENT
// ============================================================

function showView(view) {
    document.getElementById('landing').classList.toggle('active', view === 'landing');
    document.getElementById('detail').classList.toggle('active', view === 'detail');
    document.querySelectorAll('.view-btn').forEach((b, i) => {
        const isActive = (i === 0 && view === 'landing') || (i === 1 && view === 'detail');
        b.classList.toggle('active', isActive);
        b.setAttribute('aria-pressed', isActive ? 'true' : 'false');
    });
}

function switchTab(asset) {
    activeAsset = asset;
    document.querySelectorAll('.tab').forEach(t => {
        const isActive = t.getAttribute('data-asset') === asset;
        t.classList.toggle('active', isActive);
        t.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    clearReport();
}

// ============================================================
// DATA FETCHERS
// ============================================================

async function fetchWithTimeout(url, timeout = 6000) {
    const c = new AbortController();
    const id = setTimeout(() => c.abort(), timeout);
    try {
        const r = await fetch(url, { signal: c.signal });
        clearTimeout(id);
        if (!r.ok) throw new Error(`${r.status}`);
        return await r.json();
    } catch (e) { clearTimeout(id); throw e; }
}

async function fetchPrice(symbol) {
    try {
        const d = await fetchWithTimeout(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
        const p = parseFloat(d.price); if (p > 0) return p;
    } catch (e) {}
    try {
        const d = await fetchWithTimeout(`https://api.bybit.com/v5/market/tickers?category=spot&symbol=${symbol}`);
        return parseFloat(d.result.list[0].lastPrice);
    } catch (e) {}
    return null;
}

async function fetchOHLC(symbol) {
    try {
        const d = await fetchWithTimeout(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1d&limit=90`, 10000);
        if (Array.isArray(d) && d.length > 7) {
            const closes = d.map(c => parseFloat(c[4]));
            return { high90d: Math.max(...closes), low90d: Math.min(...closes), allCloses: closes };
        }
    } catch (e) {}
    try {
        const d = await fetchWithTimeout(`https://api.bybit.com/v5/market/kline?category=spot&symbol=${symbol}&interval=D&limit=90`, 10000);
        if (d.result && d.result.list) {
            const closes = d.result.list.map(c => parseFloat(c[4])).reverse();
            if (closes.length > 7) return { high90d: Math.max(...closes), low90d: Math.min(...closes), allCloses: closes };
        }
    } catch (e) {}
    return null;
}

// ============================================================
// CALCULATIONS
// ============================================================

function calcMvrvZ(price, cfg) {
    const z = cfg.mvrvAtATH * (price / cfg.ath) + cfg.mvrvOffset;
    return Math.round(Math.max(0.1, Math.min(5.0, z)) * 100) / 100;
}

function calcAsorp(closes) {
    if (closes.length < 7) return 1.0;
    const cur = closes[closes.length - 1];
    const ma = closes.slice(-7).reduce((a, b) => a + b, 0) / 7;
    return Math.round((cur / ma) * 1000) / 1000;
}

function calcVolatility(closes) {
    if (closes.length < 30) return 0;
    const r = [], s = closes.slice(-30);
    for (let i = 1; i < s.length; i++) r.push(Math.log(s[i] / s[i - 1]));
    const mu = r.reduce((a, b) => a + b, 0) / r.length;
    const v = r.reduce((a, b) => a + (b - mu) ** 2, 0) / r.length;
    return Math.round(Math.sqrt(v) * Math.sqrt(365) * 1000) / 10;
}

function calcExchDepletion(vol) {
    return Math.round(Math.max(0, 1 - vol / 150) * 100) / 100;
}

function calcCycleTiming(cfg) {
    const d = Math.floor((new Date() - new Date(cfg.athDate + "T00:00:00Z")) / 86400000);
    return { daysInBear: d, bearDays: cfg.bearDays };
}

function calcBuyZone(price, mz, asp, exd, daysInBear, cfg) {
    const bearPct = daysInBear / cfg.bearDays;
    let ms = mz < 1 ? 100 : mz < 1.5 ? 85 : mz < 2 ? 65 : mz < 3 ? 35 : 10;
    let as = asp < 0.95 ? 100 : asp < 1 ? 85 : asp < 1.05 ? 50 : 20;
    let es = Math.round(exd * 100);
    let ts = bearPct < 0.5 ? 25 : bearPct < 0.75 ? 60 : bearPct < 1.1 ? 100 : bearPct < 1.3 ? 75 : 40;
    let ps = price > cfg.priceCeiling ? 0 : price > cfg.priceBands.fair ? 40 :
             price > cfg.priceBands.mid ? 70 : price > cfg.priceBands.deep ? 85 : 100;
    const comp = ms * 0.30 + as * 0.20 + es * 0.15 + ts * 0.15 + ps * 0.20;

    if (price > cfg.priceCeiling)
        return { zone: "NOT READY", zoneLabel: "⚪ NOT READY", score: Math.round(comp),
            reasoning: `Price $${fmt(price)} above $${fmt(cfg.priceCeiling)} ceiling` };

    let zone, zoneLabel;
    if (comp >= 80) { zone = "BEST"; zoneLabel = "🟢 BEST BUY"; }
    else if (comp >= 60) { zone = "BETTER"; zoneLabel = "🟡 BETTER BUY"; }
    else if (comp >= 40) { zone = "GOOD"; zoneLabel = "🔵 GOOD BUY"; }
    else { zone = "NOT READY"; zoneLabel = "⚪ NOT READY"; }

    const reasons = [];
    if (mz < 1.5) reasons.push(`MVRV ${mz} (capitulation)`);
    if (asp < 1.0) reasons.push(`aSORP ${asp} (loss-selling)`);
    if (exd > 0.6) reasons.push(`Exch depl ${Math.round(exd * 100)}%`);
    const oS = Math.round(cfg.bearDays * 0.75), oE = Math.round(cfg.bearDays * 1.1);
    if (daysInBear >= oS && daysInBear <= oE) reasons.push(`Optimal cycle (${daysInBear}d)`);
    if (ps >= 85) reasons.push(`Deep value`);

    return { zone, zoneLabel, score: Math.round(comp),
        reasoning: reasons.length > 0 ? reasons.join(" · ") : `Score ${Math.round(comp)}/100` };
}

function calcBottom(price, mz, daysInBear, cfg) {
    const floor = cfg.ath * (1 - cfg.typicalDrawdown);
    let bm, conf;
    if (mz < 1.0) { bm = Math.min(price * 0.95, floor); conf = "HIGH"; }
    else if (mz < 1.5) { bm = price * 0.85; conf = "MEDIUM-HIGH"; }
    else if (mz < 2.0) { bm = price * 0.75; conf = "MEDIUM"; }
    else { bm = floor; conf = "MEDIUM-LOW"; }

    let ta = daysInBear < cfg.bearDays * 0.6 ? 0.85 :
             (daysInBear >= cfg.bearDays * 0.75 && daysInBear <= cfg.bearDays * 1.1) ? 1.0 : 1.05;
    const bottomPrice = Math.round((bm * 0.6 + floor * 0.4) * ta);

    let dtb;
    if (mz < 1.0) dtb = Math.max(0, Math.min(30, Math.round(cfg.bearDays * 0.9) - daysInBear));
    else if (mz < 1.5) dtb = Math.max(14, Math.min(90, Math.round(cfg.bearDays * 0.95) - daysInBear));
    else if (mz < 2.0) dtb = Math.max(60, Math.min(180, cfg.bearDays - daysInBear));
    else dtb = Math.max(90, Math.round(cfg.bearDays - daysInBear));
    if (cfg.btcLagDays > 0) dtb = Math.max(dtb, cfg.btcLagDays);
    if (daysInBear >= cfg.bearDays) dtb = Math.max(0, Math.min(dtb, 30 + cfg.btcLagDays));

    const center = new Date(); center.setDate(center.getDate() + dtb);
    const rs = new Date(center); rs.setDate(rs.getDate() - 21);
    const re = new Date(center); re.setDate(re.getDate() + 21);
    const mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    let ds;
    if (dtb <= 14) ds = "NOW (±2wk)";
    else if (rs.getMonth() === re.getMonth()) ds = `${mo[rs.getMonth()]} ${rs.getFullYear()}`;
    else if (rs.getFullYear() === re.getFullYear()) ds = `${mo[rs.getMonth()]}–${mo[re.getMonth()]} ${re.getFullYear()}`;
    else ds = `${mo[rs.getMonth()]} ${rs.getFullYear()} – ${mo[re.getMonth()]} ${re.getFullYear()}`;

    return { bottomPrice, conf, dateStr: ds, daysToBottom: dtb };
}

function fmt(n) {
    if (n >= 1000) return n.toLocaleString("en-US", { maximumFractionDigits: 0 });
    if (n >= 1) return n.toLocaleString("en-US", { maximumFractionDigits: 2 });
    return n.toFixed(4);
}

// ============================================================
// LANDING PAGE — SCAN ALL
// ============================================================

async function analyzeAsset(key) {
    const cfg = ASSETS[key];
    const price = await fetchPrice(cfg.symbol);
    if (!price) return null;
    const data = await fetchOHLC(cfg.symbol);
    if (!data) return null;

    const closes = data.allCloses;
    const mz = calcMvrvZ(price, cfg);
    const asp = calcAsorp(closes);
    const vol = calcVolatility(closes);
    const exd = calcExchDepletion(vol);
    const { daysInBear } = calcCycleTiming(cfg);

    const buyZone = calcBuyZone(price, mz, asp, exd, daysInBear, cfg);
    const bottom = calcBottom(price, mz, daysInBear, cfg);
    const athDrop = ((1 - price / cfg.ath) * 100).toFixed(0);
    const bearPct = Math.round((daysInBear / cfg.bearDays) * 100);

    return {
        key, cfg, price, mz, athDrop, bearPct, daysInBear,
        ...buyZone, ...bottom
    };
}

async function scanAll() {
    const btn = document.getElementById('scanBtn');
    const loading = document.getElementById('scanLoading');
    const error = document.getElementById('scanError');
    const ranking = document.getElementById('ranking');

    btn.disabled = true;
    loading.classList.add('active');
    error.classList.remove('active');
    ranking.innerHTML = '';

    try {
        const results = await Promise.all(
            Object.keys(ASSETS).map(k => analyzeAsset(k).catch(() => null))
        );

        const valid = results.filter(r => r !== null);
        if (valid.length === 0) throw new Error("Unable to fetch any asset data. Check connection.");

        // Sort by composite score descending (best buy first)
        valid.sort((a, b) => b.score - a.score);

        const now = new Date();
        const monthNames = ["January","February","March","April","May","June",
                           "July","August","September","October","November","December"];
        const currentMonth = `${monthNames[now.getMonth()]} ${now.getFullYear()}`;

        let html = `<div class="ranking-header">Best Buy This Month · ${currentMonth}</div>`;

        valid.forEach((r, i) => {
            const zoneClass = r.zone === "BEST" ? "zone-best" :
                              r.zone === "BETTER" ? "zone-better" :
                              r.zone === "GOOD" ? "zone-good" : "zone-wait";

            html += `
            <div class="rank-card">
                <div class="rank-num">${i + 1}</div>
                <div class="rank-body">
                    <div class="rank-top">
                        <span class="rank-asset">${r.cfg.name} (${r.cfg.ticker})</span>
                        <span class="rank-zone ${zoneClass}">${r.zoneLabel}</span>
                    </div>
                    <div class="rank-stats">
                        <span class="label">Price</span><span class="val">$${fmt(r.price)}</span>
                        <span class="label">From ATH</span><span class="val">-${r.athDrop}%</span>
                        <span class="label">Score</span><span class="val">${r.score}/100</span>
                        <span class="label">Bear Phase</span><span class="val">${r.bearPct}%</span>
                        <span class="label">Cycle Bottom</span><span class="val">$${fmt(r.bottomPrice)}</span>
                        <span class="label">Bottom When</span><span class="val">${r.dateStr}</span>
                    </div>
                    <div class="rank-reason">${r.reasoning}</div>
                </div>
            </div>`;
        });

        // Summary footer
        const best = valid[0];
        const worst = valid[valid.length - 1];
        html += `
        <div class="summary-footer">
            <strong>Top pick:</strong> ${best.cfg.name} scores ${best.score}/100 — ${best.zone === "NOT READY" ? "still above entry ceiling, patience needed" : `cycle bottom estimated at $${fmt(best.bottomPrice)} around ${best.dateStr}`}.<br>
            <strong>Weakest:</strong> ${worst.cfg.name} at ${worst.score}/100 — ${worst.zone === "NOT READY" ? "price too high or metrics unfavorable" : "lowest conviction entry of the four"}.<br>
            <span style="color:var(--kant-text-muted)">Generated ${now.toISOString().replace("T"," ").slice(0,19)} UTC · Next scan in 3-4 days</span>
        </div>`;

        ranking.innerHTML = html;

    } catch (err) {
        error.textContent = `❌ ${err.message}`;
        error.classList.add('active');
    } finally {
        btn.disabled = false;
        loading.classList.remove('active');
    }
}

    error.classList.remove("active"); report.classList.remove("active");

    const cfg = ASSETS[activeAsset];

    try {
        const price = await fetchPrice(cfg.symbol);
        if (!price) throw new Error(`Unable to fetch ${cfg.name} price.`);
        const data = await fetchOHLC(cfg.symbol);
        if (!data) throw new Error(`Unable to fetch ${cfg.name} OHLC data.`);

        const closes = data.allCloses;
        const mz = calcMvrvZ(price, cfg);
        const asp = calcAsorp(closes);
        const vol = calcVolatility(closes);
        const exd = calcExchDepletion(vol);
        const { daysInBear, bearDays } = calcCycleTiming(cfg);

        const { zoneLabel, score, reasoning } = calcBuyZone(price, mz, asp, exd, daysInBear, cfg);
        const { bottomPrice, conf, dateStr, daysToBottom } = calcBottom(price, mz, daysInBear, cfg);

        const ts = new Date().toISOString().replace("T", " ").slice(0, 19);
        const nc = new Date(); nc.setDate(nc.getDate() + 4);
        const down = ((bottomPrice / price - 1) * 100).toFixed(1);
        const bPct = Math.round((daysInBear / bearDays) * 100);
        const athDrop = ((1 - price / cfg.ath) * 100).toFixed(1);
        const lag = cfg.btcLagDays > 0 ? `\n  BTC-Lag:         +${cfg.btcLagDays}d (alts bottom after BTC)` : "";

        let action;
        if (zoneLabel.includes("BEST")) action = "Accumulation zone. High conviction entry.";
        else if (zoneLabel.includes("BETTER")) action = "Good entry. Watch for further compression.";
        else if (zoneLabel.includes("GOOD")) action = "Viable entry. Better prices likely ahead.";
        else action = "WAIT. Return when zone improves.";

        report.textContent = `
========================================
 ${cfg.name.toUpperCase()} (${cfg.ticker})
 KANT CRYPTO MONITOR
========================================
${ts} UTC

📊 METRICS
  Price:           $${fmt(price)}
  ATH:             $${fmt(cfg.ath)} (${cfg.athDate})

🎯 BUY ZONE
  ${zoneLabel}

  ${reasoning}

🔮 CYCLE BOTTOM ESTIMATE

💡 ${action}

========================================
Next check: ${nc.toISOString().split("T")[0]}
⚠️ Not financial advice.
========================================`;

        report.classList.add("active");
        copyBtn.style.display = "inline-block";
        clearBtn.style.display = "inline-block";

    } catch (err) {
        error.textContent = `❌ ${err.message}`;
        error.classList.add("active");
    } finally {
        btn.disabled = false;
        loading.classList.remove("active");
    }
}

function copyReport() {
    const text = document.getElementById("report").textContent;
    navigator.clipboard.writeText(text).then(() => {
        const b = document.getElementById("copyBtn");
        b.textContent = "✓ COPIED";
        setTimeout(() => { b.textContent = "COPY"; }, 1500);
    }).catch(() => {
        const r = document.getElementById("report");
        const rng = document.createRange(); rng.selectNodeContents(r);
        const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(rng);
        document.execCommand('copy'); sel.removeAllRanges();
    });
}

function clearReport() {
    document.getElementById("report").classList.remove("active");
    document.getElementById("copyBtn").style.display = "none";
    document.getElementById("clearBtn").style.display = "none";
    document.getElementById("detailError").classList.remove("active");
}
